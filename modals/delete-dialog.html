<link href="../src/styles/index.css" type="text/css" rel="stylesheet" />
<script src="https://miro.com/app/static/sdk/v2/miro.js"></script>

<header class="ally-wb-delete-dialog-header">
    <h2 id="dialog-title">Delete</h2>
</header>

<main>
    <p class="ally-wb-delete-dialog-message">
        Are you sure you want to delete this item?
    </p>

    <div class="ally-wb-delete-dialog-buttons">
        <button type="button" id="delete-dialog-delete-button">
            Yes, delete
        </button>
        <button type="button" id="delete-dialog-cancel-button">
            Cancel
        </button>
    </div>

    <p role="status" id="form-success-message" class="ally-wb-edit-form-success"></p>
</main>

<script type="module" src="delete-dialog.js"></script>
